<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jorhat City Service | AC · Washing Machine · Refrigerator Repair</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#070b14; --surface:#0d1424; --card:#111827;
  --border:rgba(255,255,255,0.06);
  --accent:#f97316; --accent2:#06b6d4;
  --text:#f1f5f9; --muted:#64748b; --soft:#94a3b8;
  --saffron:#FF9933; --white:#FFFFFF; --green:#138808; --navy:#000080;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}

/* ══ BACKGROUND LAYERS ══ */
.bg-flag{position:fixed;inset:0;z-index:0;pointer-events:none;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.bg-flag svg{width:min(92vw,860px);height:auto;opacity:0.042;animation:flagPulse 9s ease-in-out infinite;}
@keyframes flagPulse{0%,100%{opacity:0.035;transform:scale(1);}50%{opacity:0.055;transform:scale(1.012);}}

.bg-triband{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-triband::before{content:'';position:absolute;top:0;left:0;right:0;height:38%;background:linear-gradient(180deg,rgba(255,153,51,0.06) 0%,transparent 100%);}
.bg-triband::after{content:'';position:absolute;bottom:0;left:0;right:0;height:38%;background:linear-gradient(0deg,rgba(19,136,8,0.06) 0%,transparent 100%);}

.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.ab{position:absolute;border-radius:50%;filter:blur(140px);animation:drift 22s ease-in-out infinite alternate;}
.ab1{width:700px;height:700px;background:#FF9933;top:-220px;left:-180px;opacity:0.08;animation-duration:26s;}
.ab2{width:620px;height:620px;background:#06b6d4;bottom:-180px;right:-180px;opacity:0.09;animation-duration:20s;}
.ab3{width:480px;height:480px;background:#8b5cf6;top:28%;left:28%;opacity:0.06;animation-duration:30s;}
.ab4{width:380px;height:380px;background:#138808;bottom:12%;left:8%;opacity:0.055;animation-duration:34s;}
.ab5{width:320px;height:320px;background:#f97316;top:12%;right:8%;opacity:0.07;animation-duration:24s;}
@keyframes drift{0%{transform:translate(0,0) scale(1);}50%{transform:translate(55px,-45px) scale(1.07);}100%{transform:translate(-35px,55px) scale(0.95);}}

#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.noise{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:180px 180px;}

/* ══ TRICOLOR BORDER ANIMATION ══ */
@keyframes tricolorFlow {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.tricolor-glow {
  background: linear-gradient(90deg,#FF9933,#FF9933,#FFFFFF,#138808,#138808,#FF9933);
  background-size: 300% 300%;
  animation: tricolorFlow 4s ease infinite;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ══ INDIA FLAG POLE ══ */
.flag-stand{position:fixed;left:16px;bottom:0;z-index:800;display:flex;flex-direction:column;align-items:center;animation:poleRise 1.2s .4s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes poleRise{from{transform:translateY(70px);opacity:0;}to{transform:none;opacity:1;}}
.pole-tip{width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#fffde0,#ffd700,#b8860b);box-shadow:0 0 16px 5px rgba(255,215,0,.75);animation:tipGlow 2s ease-in-out infinite alternate;}
@keyframes tipGlow{from{box-shadow:0 0 10px 3px rgba(255,215,0,.5);}to{box-shadow:0 0 24px 9px rgba(255,215,0,.9);}}
.flag-wrap{position:relative;width:4px;}
.pole-shaft{width:4px;height:210px;background:linear-gradient(180deg,#f0d060,#9a7820,#e8c840,#9a7820,#f0d060);border-radius:2px;box-shadow:1px 0 8px rgba(0,0,0,.5),inset -1px 0 3px rgba(255,255,255,.1);}
.india-flag{position:absolute;top:0;left:4px;width:84px;height:56px;display:flex;flex-direction:column;border-radius:0 4px 4px 0;overflow:hidden;transform-origin:left top;animation:flagWave 4s ease-in-out infinite;box-shadow:3px 3px 14px rgba(0,0,0,.55);}
@keyframes flagWave{0%{transform:perspective(300px) rotateY(0deg) skewY(0);}20%{transform:perspective(300px) rotateY(-5deg) skewY(-1.8deg);}40%{transform:perspective(300px) rotateY(2.5deg) skewY(0.9deg);}60%{transform:perspective(300px) rotateY(-4deg) skewY(-1.2deg);}80%{transform:perspective(300px) rotateY(3deg) skewY(0.6deg);}100%{transform:perspective(300px) rotateY(0deg) skewY(0);}}
.fs{flex:1;background:#FF9933;}
.fw{flex:1;background:#FFFFFF;display:flex;align-items:center;justify-content:center;}
.fg2{flex:1;background:#138808;}
.chakra-wrap{width:20px;height:20px;animation:chakraSpin 6s linear infinite;}
@keyframes chakraSpin{to{transform:rotate(360deg);}}
.pole-base{width:38px;height:10px;background:linear-gradient(90deg,#7a6018,#d4af37,#7a6018);border-radius:4px;margin-top:2px;box-shadow:0 4px 10px rgba(0,0,0,.6);}
.pole-foot{width:26px;height:6px;background:linear-gradient(90deg,#5a4410,#b8962c,#5a4410);border-radius:3px;margin-top:2px;}
.flag-label{font-size:7px;font-weight:800;letter-spacing:1.5px;color:#FF9933;text-transform:uppercase;margin-top:5px;opacity:.75;}

/* ══ TRICOLOR SCROLL PROGRESS ══ */
#scroll-progress {
  position: fixed; top: 0; left: 0; height: 3px; width: 0%;
  background: linear-gradient(90deg, #FF9933 0%, #FFFFFF 50%, #138808 100%);
  z-index: 9999; transition: width 0.1s;
  box-shadow: 0 0 10px rgba(255,153,51,0.6);
}

/* ══ NAVBAR ══ */
nav{position:fixed;top:0;width:100%;z-index:900;background:rgba(7,11,20,.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:0 28px 0 112px;height:68px;display:flex;align-items:center;justify-content:space-between;animation:slideDown .7s ease both;}
@keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:none;opacity:1}}
nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#FF9933 33.33%,#FFFFFF 33.33% 66.66%,#138808 66.66%);opacity:0.6;animation:tricolorPulse 3s ease-in-out infinite;}
@keyframes tricolorPulse{0%,100%{opacity:0.5;}50%{opacity:1;box-shadow:0 0 12px rgba(255,153,51,0.4);}}

.logo{display:flex;align-items:center;gap:13px;}
.logo-svg-wrap{width:48px;height:48px;flex-shrink:0;filter:drop-shadow(0 0 8px rgba(249,115,22,.5));animation:logoGlow 4s ease-in-out infinite alternate;}
@keyframes logoGlow{from{filter:drop-shadow(0 0 6px rgba(249,115,22,.4));}to{filter:drop-shadow(0 0 16px rgba(6,182,212,.6));}}
.logo-name{font-family:'Syne';font-size:16px;font-weight:800;letter-spacing:.4px;line-height:1.15;}
.logo-tag{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.nav-right{display:flex;gap:10px;align-items:center;}
.nc{padding:9px 20px;border-radius:8px;font-family:'Outfit';font-weight:700;font-size:14px;text-decoration:none;display:flex;align-items:center;gap:7px;transition:all .25s;cursor:pointer;}
.nc-call{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;box-shadow:0 0 16px rgba(249,115,22,.3);}
.nc-call:hover{transform:translateY(-2px);box-shadow:0 0 28px rgba(249,115,22,.55);}
.nc-wa{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;}
.nc-wa:hover{transform:translateY(-2px);box-shadow:0 0 24px rgba(34,197,94,.45);}

/* ══ HERO ══ */
.hero{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:100px 36px 60px 118px;overflow:hidden;}
.hero-inner{max-width:1140px;width:100%;display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(249,115,22,.35);background:rgba(249,115,22,.08);border-radius:100px;padding:5px 16px;font-size:12px;font-weight:600;letter-spacing:2.5px;color:var(--accent);text-transform:uppercase;margin-bottom:22px;animation:fadeUp .8s .2s both;}
.live-dot{width:7px;height:7px;background:#22c55e;border-radius:50%;animation:lp 1.5s infinite;}
@keyframes lp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.6)}}
.hero-left h1{font-family:'Syne';font-size:clamp(40px,5.5vw,74px);font-weight:800;line-height:1.02;letter-spacing:-1px;margin-bottom:20px;animation:fadeUp .8s .4s both;}
.h1-or{color:#f97316;}.h1-cy{color:#06b6d4;}

/* Tricolor animated text */
.h1-tri {
  background: linear-gradient(90deg, #FF9933, #FF9933, #cccccc, #138808, #138808);
  background-size: 200% 200%;
  animation: triSlide 3s ease-in-out infinite alternate;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
@keyframes triSlide {
  0%  { background-position: 0% 50%; }
  100%{ background-position: 100% 50%; }
}

.hero-desc{font-size:16px;color:var(--soft);line-height:1.75;margin-bottom:32px;animation:fadeUp .8s .6s both;max-width:440px;}
.hero-ctas{display:flex;gap:12px;flex-wrap:wrap;animation:fadeUp .8s .8s both;}
.btn{padding:13px 26px;border-radius:10px;font-family:'Outfit';font-weight:700;font-size:15px;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all .3s;border:none;cursor:pointer;}
.btn-or{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;box-shadow:0 4px 20px rgba(249,115,22,.35);}
.btn-or:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(249,115,22,.6);}
.btn-gr{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;box-shadow:0 4px 20px rgba(34,197,94,.3);}
.btn-gr:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(34,197,94,.5);}
.btn-gh{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn-gh:hover{border-color:var(--accent2);color:var(--accent2);transform:translateY(-3px);}
.hero-stats{display:flex;gap:24px;margin-top:40px;flex-wrap:wrap;animation:fadeUp .8s 1s both;}
.hs-num{font-family:'Syne';font-size:36px;font-weight:800;color:#f97316;line-height:1;}
.hs-label{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px;}
.hs-div{width:1px;background:var(--border);align-self:stretch;}

/* ══ HERO PHOTO COLLAGE ══ */
.hero-right{position:relative;animation:fadeUp .8s .5s both;height:460px;}
.ph-main{position:absolute;top:0;right:0;width:80%;height:290px;border-radius:20px;object-fit:cover;border:2px solid rgba(249,115,22,.4);box-shadow:0 24px 64px rgba(0,0,0,.75);transition:transform .35s;background:#111827;overflow:hidden;}
.ph-main:hover{transform:scale(1.025);}
.ph-bl{position:absolute;bottom:8px;left:0;width:47%;height:185px;border-radius:16px;object-fit:cover;border:2px solid rgba(6,182,212,.4);box-shadow:0 14px 40px rgba(0,0,0,.65);transition:transform .35s;z-index:2;background:#111827;overflow:hidden;}
.ph-bl:hover{transform:scale(1.03);}
.ph-br{position:absolute;bottom:8px;right:6px;width:35%;height:150px;border-radius:14px;object-fit:cover;border:2px solid rgba(139,92,246,.4);box-shadow:0 10px 30px rgba(0,0,0,.65);transition:transform .35s;z-index:2;background:#111827;overflow:hidden;}
.ph-br:hover{transform:scale(1.03);}

.ph-img{width:100%;height:100%;object-fit:cover;border-radius:inherit;transition:transform .5s;}
.ph-main:hover .ph-img,.ph-bl:hover .ph-img,.ph-br:hover .ph-img{transform:scale(1.07);}

.ph-lbl{position:absolute;background:rgba(7,11,20,.88);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:5px 11px;font-size:10px;font-weight:700;letter-spacing:.8px;z-index:6;}
.ph-lbl-ac{top:12px;left:12px;color:#f97316;border-color:rgba(249,115,22,.35);}
.ph-lbl-wm{bottom:24px;left:10px;color:#06b6d4;border-color:rgba(6,182,212,.35);}
.ph-lbl-rf{bottom:24px;right:18px;color:#a78bfa;border-color:rgba(167,139,250,.35);}

.hero-badge{position:absolute;bottom:176px;left:-12px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:11px 15px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(16px);box-shadow:0 20px 40px rgba(0,0,0,.6);z-index:8;animation:floatY 3.5s ease-in-out infinite;}
.hb-icon{font-size:22px;}
.hb-text{font-size:13px;font-weight:700;}
.hb-sub{font-size:11px;color:var(--muted);}
.hero-cert{position:absolute;top:12px;left:0;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:10px;padding:7px 13px;font-size:11px;font-weight:800;color:#fff;box-shadow:0 8px 24px rgba(249,115,22,.45);animation:floatY 3s ease-in-out infinite .6s;z-index:6;}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}

/* ══ INDIAN FLAG COLORS ANIMATED DIVIDER ══ */
.tricolor-divider {
  height: 4px;
  background: linear-gradient(90deg, #FF9933 0%, #FF9933 33%, #ffffff 33%, #ffffff 66%, #138808 66%, #138808 100%);
  position: relative;
  z-index: 1;
  overflow: hidden;
}
.tricolor-divider::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
  animation: shimmer 2s infinite;
}
@keyframes shimmer { from{transform:translateX(-100%)} to{transform:translateX(100%)} }

/* ══ SECTIONS ══ */
section{position:relative;z-index:1;padding:90px 36px;}
.sec-lbl{text-align:center;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:10px;}
.sec-title{text-align:center;font-family:'Syne';font-size:clamp(30px,5vw,50px);font-weight:800;letter-spacing:-.5px;margin-bottom:14px;}
.sec-bar{width:48px;height:4px;border-radius:4px;background:linear-gradient(90deg,#FF9933,#ffffff,#138808);margin:0 auto 56px;animation:tricolorFlow 3s ease infinite;}
.max{max-width:1100px;margin:0 auto;}

/* ══ SERVICES ══ */
.svc-bg{background:var(--surface);}
.svc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:24px;}
.scard{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:all .4s cubic-bezier(.34,1.56,.64,1);}
.scard:hover{transform:translateY(-10px);border-color:rgba(249,115,22,.35);box-shadow:0 30px 60px rgba(0,0,0,.55);}
.scard-img-wrap{position:relative;height:220px;overflow:hidden;}
.scard-img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
.scard:hover .scard-img{transform:scale(1.07);}
.scard-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 42%,rgba(7,11,20,.92) 100%);}
.scard-chip{position:absolute;top:12px;left:12px;background:rgba(7,11,20,.85);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:5px 12px;font-size:11px;font-weight:700;color:var(--accent2);letter-spacing:1px;z-index:3;}

/* Tricolor card border on hover */
.scard::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 22px;
  background: linear-gradient(135deg, #FF9933, #FFFFFF, #138808);
  opacity: 0;
  transition: opacity 0.4s;
  z-index: -1;
}
.scard:hover::before { opacity: 1; }

.scard-body{padding:22px;}
.scard-icon{font-size:30px;margin-bottom:10px;display:block;}
.scard h3{font-family:'Syne';font-size:20px;font-weight:800;margin-bottom:8px;}
.scard p{font-size:14px;color:var(--soft);line-height:1.7;margin-bottom:16px;}
.scard-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:18px;}
.stag{background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.2);color:#f97316;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600;}
.scard-btns{display:flex;gap:8px;}
.scb{flex:1;padding:10px;border-radius:8px;font-family:'Outfit';font-weight:700;font-size:13px;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .25s;}
.scb-or{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;}
.scb-or:hover{transform:scale(1.03);box-shadow:0 4px 16px rgba(249,115,22,.4);}
.scb-gr{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;}
.scb-gr:hover{transform:scale(1.03);box-shadow:0 4px 16px rgba(34,197,94,.3);}

/* ══ WHY ══ */
.why-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;}
.wcard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:26px 20px;text-align:center;transition:all .3s;position:relative;overflow:hidden;}
.wcard::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#FF9933,#FFFFFF,#138808);transform:scaleX(0);transition:transform .3s;}
.wcard:hover::after{transform:scaleX(1);}
.wcard:hover{border-color:rgba(6,182,212,.35);transform:translateY(-6px);box-shadow:0 20px 40px rgba(0,0,0,.3);}
.wcard-icon{font-size:36px;margin-bottom:12px;display:block;}
.wcard h4{font-family:'Syne';font-size:16px;font-weight:800;margin-bottom:7px;}
.wcard p{font-size:13px;color:var(--soft);line-height:1.65;}

/* ══ TESTIMONIALS ══ */
.tstrip{background:var(--bg);overflow:hidden;padding:48px 0;position:relative;z-index:1;}
.tstrip-inner{display:flex;gap:20px;animation:marquee 40s linear infinite;width:max-content;}
.tstrip:hover .tstrip-inner{animation-play-state:paused;}
.tcard{display:inline-flex;flex-direction:column;gap:7px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 22px;width:270px;flex-shrink:0;}
.stars{color:#fbbf24;font-size:13px;}
.tcard-text{font-size:13px;color:var(--soft);line-height:1.6;}
.tcard-name{font-size:12px;font-weight:700;color:#f97316;}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ══ BOOKING ══ */
.bk-bg{background:var(--surface);}
.bk-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start;max-width:1000px;margin:0 auto;}
.bk-left h2{font-family:'Syne';font-size:32px;font-weight:800;margin-bottom:14px;line-height:1.1;}
.bk-left p{font-size:15px;color:var(--soft);line-height:1.7;margin-bottom:26px;}
.cr{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.cr-ic{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ic-or{background:rgba(249,115,22,.12);}.ic-gr{background:rgba(34,197,94,.12);}.ic-cy{background:rgba(6,182,212,.12);}
.cr-text{font-size:15px;font-weight:700;}.cr-sub{font-size:12px;color:var(--muted);}
.bk-ctas{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px;}
.bform{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:30px;position:relative;overflow:hidden;}
.bform::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#FF9933 33%,#ffffff 33% 66%,#138808 66%);animation:shimmer 2s infinite;}
.bform h3{font-family:'Syne';font-size:21px;font-weight:800;margin-bottom:20px;color:#f97316;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.fg input,.fg select,.fg textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Outfit';font-size:14px;outline:none;transition:border-color .25s,box-shadow .25s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#f97316;box-shadow:0 0 0 3px rgba(249,115,22,.12);}
.fg select option{background:var(--surface);}
